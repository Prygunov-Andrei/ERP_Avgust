# =============================================================================
# Только инфраструктура для локальной разработки
# БД — на проде через SSH-туннель (dev-local.sh поднимает автоматически)
# Здесь только Redis (Celery) и MinIO (файлы)
# Приложения (Django, Vite, Celery) запускаются нативно на хосте
# Использование: docker compose -f docker-compose.dev.yml up -d
# =============================================================================

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/worklog-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/worklog-media;
      /usr/bin/mc mb myminio/files --ignore-existing;
      /usr/bin/mc mb myminio/product-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/product-media;
      exit 0;
      "

volumes:
  redis_data:
  minio_data:
